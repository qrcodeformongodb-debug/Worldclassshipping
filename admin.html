<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>worldclassshipping | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Error display styles */
    #errorBox {
      background: #dc3545;
      color: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 4px;
      display: none;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #errorBox.show {
      display: block;
    }
    #statusBox {
      background: #28a745;
      color: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      display: none;
    }
    #statusBox.show {
      display: block;
    }
    #debugLog {
      background: #f8f9fa;
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      display: none;
    }
    #debugLog.show {
      display: block;
    }
    .debug-line {
      margin: 2px 0;
      padding: 2px 0;
      border-bottom: 1px solid #eee;
    }
    .debug-error {
      color: #dc3545;
      font-weight: bold;
    }
    .debug-success {
      color: #28a745;
    }
    #toggleDebug {
      background: #6c757d;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">worldclassshipping Admin</div>
  <nav>
    <a href="admin.html" class="active">Shipments</a>
    <a href="chat.html">Support Chat</a>
  </nav>
</header>

<section class="admin-section">
  
  <!-- Error Display Box -->
  <div id="errorBox"></div>
  
  <!-- Status Display Box -->
  <div id="statusBox"></div>
  
  <!-- Debug Log -->
  <button id="toggleDebug" onclick="toggleDebug()">Show Debug Log</button>
  <div id="debugLog"></div>

  <h2>Create / Edit Shipment</h2>

  <div class="form-box">
    <input id="tracking" readonly placeholder="Tracking Number">

    <input id="sender" placeholder="Sender Name">
    <input id="recipient" placeholder="Receiver Name">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">
    <input id="weight" placeholder="Weight (kg)">

    <input id="status" placeholder="Current Status">
    <input id="lastUpdate" placeholder="Last Update">

    <h3>Set Route</h3>
    <div id="adminMap" style="height:300px; width:100%; margin-bottom:10px; border:1px solid #ddd;"></div>
    <p style="color:gray; font-size:0.9em;">
      Click on the map to add points. Drag markers to adjust.
    </p>

    <button onclick="saveShipment()">Save Shipment</button>
  </div>

  <h2>All Shipments</h2>
  <table>
    <thead>
      <tr>
        <th>Tracking</th>
        <th>Receiver</th>
        <th>Status</th>
        <th>Last Update</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="shipmentTable">
      <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
    </tbody>
  </table>
</section>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Global error display functions
  window.showError = function(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = 'ERROR: ' + msg;
    box.classList.add('show');
    window.logDebug('ERROR: ' + msg, 'error');
  };
  
  window.showStatus = function(msg) {
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.classList.add('show');
    setTimeout(() => box.classList.remove('show'), 5000);
    window.logDebug('STATUS: ' + msg, 'success');
  };
  
  window.logDebug = function(msg, type = 'info') {
    const log = document.getElementById('debugLog');
    const line = document.createElement('div');
    line.className = 'debug-line debug-' + type;
    line.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
    log.appendChild(line);
  };
  
  window.toggleDebug = function() {
    const log = document.getElementById('debugLog');
    log.classList.toggle('show');
    const btn = document.getElementById('toggleDebug');
    btn.textContent = log.classList.contains('show') ? 'Hide Debug Log' : 'Show Debug Log';
  };
  
  // Catch all errors
  window.onerror = function(msg, url, line, col, error) {
    const fullMsg = msg + ' (line ' + line + ':' + col + ')';
    window.showError(fullMsg);
    window.logDebug('WINDOW ERROR: ' + fullMsg, 'error');
    return false;
  };
  
  // Catch unhandled promise rejections
  window.addEventListener('unhandledrejection', function(e) {
    window.showError('Promise rejected: ' + e.reason);
    window.logDebug('UNHANDLED REJECTION: ' + e.reason, 'error');
  });
  
  window.logDebug('Page loaded, waiting for scripts...');
</script>

<!-- Firebase Module Scripts -->
<script type="module" src="firebase.js"></script>
<script type="module" src="adminscript.js"></script>

</body>
</html>
