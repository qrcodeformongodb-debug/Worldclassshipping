<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Shipment | worldclassshipping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="track.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <style>
    .video-section {
      margin: 20px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .video-section h3 {
      margin-bottom: 15px;
      color: #002147;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      max-width: 100%;
      background: #000;
      border-radius: 8px;
    }
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #map {
      height: 400px;
      border-radius: 8px;
      border: 2px solid #002147;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .route-animated {
      stroke: #002147;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 10;
      animation: dash 20s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -1000; }
    }
    .custom-marker {
      background: #002147;
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 12px;
      border: 3px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">worldclassshipping</div>
</header>

<section class="tracking-container">
  <h2>Shipment Tracking</h2>
  <p>Tracking Number: <strong id="tn"></strong></p>

  <div class="card">
    <h3>Shipment Details</h3>
    <p>Sender: <span id="sender"></span></p>
    <p>Receiver: <span id="receiver"></span></p>
    <p>Origin: <span id="origin"></span></p>
    <p>Destination: <span id="destination"></span></p>
    <p>Weight: <span id="weight"></span></p>
    <p>Status: <span id="status"></span></p>
    <p>Last Update: <span id="lastUpdate"></span></p>
  </div>

  <!-- Video Section -->
  <div class="card video-section" id="videoSection" style="display:none;">
    <h3>📹 Shipment Video</h3>
    <div class="video-container">
      <video id="shipmentVideo" controls poster="https://via.placeholder.com/800x450/002147/ffffff?text=Shipment+Video">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <div class="card">
    <h3>Route</h3>
    <div id="map"></div>
  </div>
</section>

<!-- Need Help Chat Widget -->
<div class="chat-widget" id="chatWidget">
  <button class="chat-fab" id="chatFab" title="Need Help?">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    </svg>
    <span class="chat-badge" id="chatBadge">0</span>
  </button>

  <div class="chat-window" id="chatWindow">
    <div class="chat-window-header">
      <div class="chat-header-title">
        <span class="status-dot"></span>
        <span>Customer Support</span>
      </div>
      <button class="chat-close-btn" id="chatCloseBtn">&times;</button>
    </div>

    <div class="chat-window-body" id="chatBody">
      <div class="chat-welcome">
        <div class="welcome-icon">👋</div>
        <h4>Hello!</h4>
        <p>How can we help you with your shipment <strong id="chatTrackingNumber"></strong>?</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="chat-window-footer">
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="chat-input-wrapper">
        <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
        <button id="chatSendBtn" class="chat-send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="firebase.js"></script>
<script type="module" src="track.js"></script>

</body>
</html>
